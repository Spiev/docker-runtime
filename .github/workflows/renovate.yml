name: Renovate

on:
  schedule:
    # Runs every 6 hours — nginx gets checked on every run (first line of defense),
    # all other services are limited to the midnight Berlin window via renovate.json schedule.
    # 22:00 UTC = midnight CEST (summer), 23:00 UTC = midnight CET (winter)
    - cron: "0 0,6,12,18,22,23 * * *"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Run Renovate
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_AUTODISCOVER: "true"
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENOVATE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '{"schedule":["at any time"]}' || '' }}
