name: Renovate

on:
  schedule:
    # Runs every 6 hours — nginx gets checked on every run (first line of defense),
    # all other services are limited to the 03:00 window via renovate.json schedule.
    - cron: "0 */6 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Renovate
        uses: renovatebot/github-action@abd08c7549b2a864af5df4a2e369c43f035a6a9d # v46.1.5
        with:
          configurationFile: .github/renovate.json
          token: ${{ steps.app-token.outputs.token }}
