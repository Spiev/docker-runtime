name: Renovate

on:
  schedule:
    # Runs every 2 hours — this only sets HOW OFTEN Renovate runs. WHAT it may change is
    # gated by the `schedule` in renovate.json: non-proxy services only within the nightly
    # Berlin window (01:00–05:00), the proxy (schedule "at any time") on every run.
    # Running frequently makes the window immune to GitHub Actions cron jitter.
    - cron: "0 */2 * * *"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Run Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_AUTODISCOVER: "true"
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENOVATE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '{"schedule":["at any time"]}' || '' }}
