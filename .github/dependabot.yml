version: 2
# All services check daily at 03:00 Europe/Berlin.
# Minor/patch updates are auto-merged via dependabot-auto-merge.yml.
# Nginx is auto-deployed via scripts/nginx_update.sh; other services require manual deployment.
updates:
  # Proxy: nginx, certbot (internet-facing, first line of defense)
  - package-ecosystem: "docker-compose"
    directory: "/proxy"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"

  # Home Assistant stack: HA, mosquitto, matter-hub, music-assistant
  - package-ecosystem: "docker-compose"
    directory: "/homeassistant"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"

  # Paperless: webserver, postgres, redis, gotenberg, tika
  - package-ecosystem: "docker-compose"
    directory: "/paperless"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"

  # Immich: server, ML, redis, postgres
  - package-ecosystem: "docker-compose"
    directory: "/immich"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Immich uses custom postgres image with VectorChord extension
      # Wait for official Immich support before upgrading
      - dependency-name: "immich-app/postgres"
        update-types: ["version-update:semver-major"]

  # Pi-hole
  - package-ecosystem: "docker-compose"
    directory: "/pihole"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"

  # FreshRSS
  - package-ecosystem: "docker-compose"
    directory: "/freshrss"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"

  # Teslamate: teslamate, postgres, grafana
  - package-ecosystem: "docker-compose"
    directory: "/teslamate"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions: keep pinned SHAs up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"
