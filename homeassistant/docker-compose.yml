services:
  homeassistant:
    container_name: homeassistant
    image: homeassistant/home-assistant:2026.5.4@sha256:ceb1202133a5a036e8b03e20a10eb113186cc2f871968323c6fc6c3fc4205716
    devices:
      - /dev/ttyACM0 # mappes zigbee Dongel to container
    network_mode: "host"
    volumes:
      - './homeassistant/config:/config'
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
  mosquitto:
    image: eclipse-mosquitto:2.0.22@sha256:914f529386804c8278a4e581526b9be5e1604df44b30daabc70aa97dcefe5268
    user: root
    container_name: mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto:/mosquitto
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - 1883:1883
      - 9001:9001
  matter-hub:
    image: ghcr.io/riddix/home-assistant-matter-hub:2.0.45@sha256:9b0ba82a982a8204156952be235610a6fdad20f1775904828d6a878a8f5a88ed
    container_name: matter-hub
    restart: unless-stopped
    network_mode: host
    # default Port is 8482
    env_file:
      - .env
    volumes:
      - $PWD/home-assistant-matter-hub:/data
  music-assistant:
    image: ghcr.io/music-assistant/server:2.8.9@sha256:7c322702905d55a5cdc4ca2dcb4ea951150bd0169f81a09a30f0ac67b31f7285
    container_name: musicassistant
    restart: unless-stopped
    # Network mode must be set to host for MA to work correctly
    network_mode: "host"
    volumes:
      - ./musicassistant/data:/data/
    # privileged caps (and security-opt) needed to mount smb folders within the container
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    environment:
      # Provide logging level as environment variable.
      # default=info, possible=(critical, error, warning, info, debug)
      - LOG_LEVEL=error
