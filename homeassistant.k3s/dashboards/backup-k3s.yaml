title: Backup k3s
views:
  - title: Backup k3s
    type: masonry
    cards:
      - type: vertical-stack
        cards:
          - type: entity
            entity: sensor.backup_overall_status
            name: k3s Backup
            icon: mdi:backup-restore
            state_color: true
          - type: markdown
            content: >
              | | |

              |---|---|

              | **Letzter Lauf** | {% set t = state_attr('sensor.backup_overall_status',
              'last_run') %}{{ t | as_datetime | relative_time if t else '—' }} |

              | **Dauer** | {{ state_attr('sensor.backup_overall_status',
              'duration_seconds') | default('—') }}s |

              | **Repo-Größe** | {{ state_attr('sensor.backup_overall_status',
              'repository_size_gb') | default('—') }} GB |

              | **Snapshots gesamt** | {{ state_attr('sensor.backup_overall_status',
              'snapshot_count') | default('—') }} |

      - type: markdown
        title: Details pro Service
        content: >
          | Service | Neue Dateien | Geändert | Snapshots |

          |---|---|---|---|

          | **Paperless** | {{ state_attr('sensor.backup_paperless_ngx',
          'files_new') | default('—') }} | {{ state_attr('sensor.backup_paperless_ngx',
          'files_changed') | default('—') }} | {{ state_attr('sensor.backup_paperless_ngx',
          'snapshot_count') | default('—') }} |

          | **Seafile** | {{ state_attr('sensor.backup_seafile_status',
          'files_new') | default('—') }} | {{ state_attr('sensor.backup_seafile_status',
          'files_changed') | default('—') }} | {{ state_attr('sensor.backup_seafile_status',
          'snapshot_count') | default('—') }} |

          | **Teslamate** | {{ state_attr('sensor.backup_teslamate_status',
          'files_new') | default('—') }} | {{ state_attr('sensor.backup_teslamate_status',
          'files_changed') | default('—') }} | {{ state_attr('sensor.backup_teslamate_status',
          'snapshot_count') | default('—') }} |

      - type: logbook
        title: Backup-Verlauf
        hours_to_show: 168
        target:
          entity_id:
            - sensor.backup_overall_status
