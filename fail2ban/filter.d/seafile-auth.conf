# Fail2Ban filter for Seafile REST API authentication failures
# ============================================================================
# Seafile returns HTTP 400 (not 401) on failed login via POST /api2/auth-token/.
# Verified 2026-04-22 via kubectl exec curl test.
#
# This filter is intentionally separate from nginx-4xx (maxretry=3) because
# the legitimate 2FA login flow generates 2x 400 per attempt:
#   1. POST /api2/auth-token/ → 400 ("OTP required")
#   2. POST /api2/auth-token/ → 400 (if OTP wrong) or 200 (success)
# A maxretry of 3 would ban after 1.5 login attempts, so this jail uses
# a higher threshold (see jail.d/nginx.local).
# ============================================================================

[Definition]

failregex = ^<HOST> -.* - \[[^\]]*\] "POST /api2/auth-token/ HTTP\/1\.[01]" 400 \d+ ".*" ".*"$
