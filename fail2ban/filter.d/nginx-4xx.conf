# Fail2Ban filter for Nginx 4xx responses
# ============================================================================
# Matches 401 Unauthorized, 403 Forbidden, 404 Not Found responses
# These indicate failed auth attempts, blocked access, or probing
#
# Protects all services behind nginx reverse proxy:
# - Immich (DOMAIN1)
# - Paperless (DOMAIN2)
# - FreshRSS (DOMAIN3)
# - Home Assistant (DOMAIN4)
# - Seafile (DOMAIN5)
# ============================================================================

[Definition]

# Match 401/403/404 responses
# Log format: IP - - [timestamp] "METHOD /path HTTP/version" STATUS size "referer" "user-agent"
failregex = ^<HOST> -.* - \[[^\]]*\] "(?:GET|POST|HEAD|PUT|DELETE) \S* HTTP\/1\.[01]" (401|403|404) \d+ ".*" ".*"$

# Ignore legitimate 404s (favicons, robots.txt, etc.)
# Ignore Home Assistant iOS companion app requests (api/ios/config always returns 404)
# Ignore Seafile sync backend 403s — the /seafhttp/ path requires an authenticated token;
#   403 means "unauthorized repo access", not a brute-force attempt. Real auth failures
#   happen at /api2/auth-token/ (400) and /accounts/login/ (403), which are covered above.
# Ignore Seafile desktop client polling /notification/ping — returns 404 permanently
#   (endpoint not implemented in this version). Without this, external desktop clients
#   would ban themselves after 3 polls.
ignoreregex = ^<HOST> .* "(GET|HEAD) /(favicon\.ico|robots\.txt|apple-touch-icon|site\.webmanifest) HTTP/1\.[01]" 404
             ^<HOST> .* "GET /api/ios/config HTTP/1\.[01]" 404
             ^<HOST> .* "(?:GET|POST|HEAD|PUT|DELETE) /seafhttp/\S* HTTP/1\.[01]" 403
             ^<HOST> .* "GET /notification/ping HTTP/1\.[01]" 404
